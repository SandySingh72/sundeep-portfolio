<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <!-- Outer border box -->
  <rect x="4" y="4" width="112" height="92" fill="none" stroke="white" stroke-width="8"/>
  <!-- Inner border line (double border effect) -->
  <rect x="14" y="14" width="92" height="72" fill="none" stroke="white" stroke-width="2"/>
  <!-- Large S — BLUE -->
  <text x="10" y="82" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#38bdf8">S</text>
  <!-- Small B stacked on top -->
  <text x="72" y="48" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="white">B</text>
  <!-- Small S below -->
  <text x="72" y="80" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="white">S</text>
</svg>
